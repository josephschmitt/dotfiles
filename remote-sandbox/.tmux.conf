# Standalone tmux config for remote sandboxes (crafting.dev)
# Self-contained — no plugins, no dependencies

# --- Terminal ---
set -g default-terminal 'tmux-256color'
set -g terminal-overrides ',xterm-256color:RGB'
set -g set-titles on
set -g set-titles-string '#{?#{m:[0-9]*,#S},tmux #{pane_current_path} · #h,#S · #h}'
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# --- Core Options ---
set -g prefix C-s
set -gu prefix2
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 50000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
setw -g mode-keys vi

# --- Catppuccin Mocha Colors ---
# base=#1e1e2e surface0=#313244 surface1=#45475a overlay0=#6c7086
# text=#cdd6f4 mauve=#cba6f7 pink=#f5c2e7 peach=#fab387 blue=#89b4fa

# --- Pane Borders ---
set -g pane-active-border-style 'fg=#cba6f7,bg=default'
set -g pane-border-style 'fg=#45475a,bg=default'

# --- Status Bar (2 lines) ---
set -g status 2
set -g status-style 'bg=#313244,fg=#cdd6f4'
set -g status-right-length 80
set -g status-left-length 40

# Left: session pill (mauve, turns peach on prefix)
set -g status-left '#{?client_prefix,#[bg=#fab387],#[bg=#cba6f7]}#[fg=#1e1e2e,bold] #S #[default]  '

# Right: hostname + time
set -g status-right '#[fg=#89b4fa]#h  #[fg=#6c7086]%H:%M'

# Window tabs
set -g window-status-format '#[fg=#6c7086] #I:#W '
set -g window-status-current-format '#[fg=#f5c2e7,bold] #I:#W '
set -g window-status-separator ''

# Bottom bar: keybinding cheat sheet (commas in style tags escaped as #, to avoid #{?} delimiter conflict)
set -g status-format[1] '#[align=left range=left]#{?pane_in_mode,#[bg=#1e1e2e#,fg=#6c7086] COPY: v select · y yank · / search · Esc exit,#[bg=#1e1e2e#,fg=#6c7086] C-s prefix · -split · |split · x close · n window · v copy · ? help}'

# Message styling
set -g message-style 'bg=#313244,fg=#cdd6f4'
set -g message-command-style 'bg=#313244,fg=#cdd6f4'

# --- Keybindings ---
unbind-key -a

# Window management
bind n new-window -c "#{pane_current_path}"
bind -n M-n new-window -c "#{pane_current_path}"
bind r command-prompt -I "#{window_name}" -p "Window name:" "rename-window '%%'"
bind X kill-window

# Window navigation (no prefix)
bind -n M-[ previous-window
bind -n M-] next-window

# Pane splitting
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Pane utilities
bind x kill-pane
bind * setw synchronize-panes

# Pane cycling (no prefix)
bind -n M-` select-pane -t :.+
bind -n M-~ select-pane -t :.-

# Pane selection by number
bind p display-panes
bind 1 select-pane -t 1
bind 2 select-pane -t 2
bind 3 select-pane -t 3
bind 4 select-pane -t 4
bind 5 select-pane -t 5
bind 6 select-pane -t 6
bind 7 select-pane -t 7
bind 8 select-pane -t 8
bind 9 select-pane -t 9

# Pane resizing (repeatable)
bind -r h resize-pane -L 10
bind -r l resize-pane -R 10
bind -r j resize-pane -D 7
bind -r k resize-pane -U 7

# Session management
bind s command-prompt -I "#{session_name}" -p "Session name:" "rename-session '%%'"
bind q confirm-before -p "Kill the current tmux session? (y/n)" "kill-session"
bind d detach-client

# Copy mode
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi J send-keys -X scroll-down
bind -T copy-mode-vi K send-keys -X scroll-up
bind -T copy-mode-vi Escape send-keys -X cancel

# Help popup
bind ? display-popup -w 60 -h 30 -E "printf '\n\
  tmux Keybindings\n\
  ════════════════\n\n\
  WINDOWS\n\
  C-s n       New window\n\
  Alt+n       New window (no prefix)\n\
  C-s r       Rename window\n\
  C-s X       Kill window\n\
  Alt+[ / ]   Prev/next window\n\n\
  PANES\n\
  C-s -       Horizontal split\n\
  C-s |       Vertical split\n\
  C-s x       Kill pane\n\
  Alt+` / ~   Cycle panes\n\
  C-s 1-9     Select pane\n\
  C-s h/j/k/l Resize pane\n\
  C-s *       Sync panes\n\n\
  SESSIONS\n\
  C-s s       Rename session\n\
  C-s d       Detach\n\
  C-s q       Kill session\n\n\
  COPY MODE\n\
  C-s v       Enter copy mode\n\
  v           Begin selection\n\
  y           Yank (copy)\n\
  J / K       Scroll down/up\n\
  /           Search\n\
  Esc         Exit copy mode\n\n\
  OTHER\n\
  C-s c       Reload config\n\
  C-s :       Command prompt\n\
  C-s ?       This help\n\n'; \
read -n 1 -s -r -p '  Press any key to close...'"

# Reload config
bind c source-file ~/.tmux.conf \; display-message "Config reloaded"

# Misc
bind : command-prompt
