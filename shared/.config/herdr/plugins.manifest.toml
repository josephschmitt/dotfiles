# Declarative manifest of herdr plugins for this machine. Source of truth —
# apply with `herdr-plugins`. This is NOT herdr's own ~/.config/herdr/plugins.json
# (that's generated state: resolved commit hashes, absolute install paths,
# timestamps). See AGENTS.md for the distinction.

[[plugins]]
plugin_id = "pj"
description = "Project jumper — fuzzy-find pj projects and open them as herdr workspaces (prefix+shift+p)"
install = "josephschmitt/pj-herdr"

[[plugins]]
plugin_id = "gh-pr"
description = "Labels the focused agent pane's sidebar row with its branch's GitHub PR status (prefix+g open PR, prefix+u refresh)"
link = "~/development/herdr-plugin-gh-pr"
note = "Personal fork (josephschmitt/herdr-plugin-gh-pr, tracking upstream wyattjoh/herdr-plugin-gh-pr) cloned to the path above. `herdr-plugins link` re-links whatever branch/worktree is currently checked out there — switch worktrees manually first if you want a specific patch set active."
