onboarding = false
new_cwd = "~/development"
prompt_new_tab_name = false

[session]
resume_agents_on_restore = true

[keys]
prefix = "ctrl+s"

# Pane navigation — Alt+hjkl (matches tmux-tilish / vim-tmux-navigator)
focus_pane_left = "alt+h"
focus_pane_down = "alt+j"
focus_pane_up = "alt+k"
focus_pane_right = "alt+l"

# Pane cycling — Alt+`/~ (matches tmux)
cycle_pane_next = "alt+backtick"
cycle_pane_previous = "alt+shift+backtick"

# Rename pane — prefix+p (default prefix+shift+p freed up for pj-herdr plugin)
rename_pane = "prefix+p"

# Tab switching — Alt+1-9 (matches tmux-tilish window switching)
switch_tab = "alt+1..9"

# Tab navigation — prefix+[/]
previous_tab = "prefix+["
next_tab = "prefix+]"

# Copy mode — prefix+v (matches tmux; default prefix+[ conflicts with previous_tab)
copy_mode = "prefix+v"

# New tab — Alt+n (matches tmux new-window)
new_tab = "prefix+n"

# Agent navigation — Alt+[/]
previous_agent = "alt+["
next_agent = "alt+]"
focus_agent = "prefix+1..9"

# Goto — prefix+o (jump prompt listing workspaces/spaces and agents to switch to;
# moved from default prefix+g, which is now free)
goto = "prefix+o"
# Workspace picker disabled — default prefix+w conflicts with open_worktree, and
# prefix+o is used for goto instead
workspace_picker = ""
# Rename workspace — moved from default prefix+shift+w (conflicts with new_worktree)
rename_workspace = "prefix+shift+e"
# open_notification_target disabled — no free slot
open_notification_target = ""
new_workspace = "prefix+shift+n"
previous_workspace = "alt+shift+["
next_workspace = "alt+shift+]"
switch_workspace = "alt+shift+1..9"

# Split panes (matches tmux)
split_horizontal = "prefix+\\"
split_vertical = "prefix+|"

# Zoom — Alt+z
zoom = "alt+z"

# Open worktree picker — prefix+w (lists existing checkouts; focuses open ones, opens closed ones)
open_worktree = "prefix+w"

# New worktree — prefix+shift+w (matches new_workspace = prefix+shift+n pattern)
new_worktree = "prefix+shift+w"

# Remove worktree — prefix+shift+d
remove_worktree = "prefix+shift+d"

# Quick shell (closes on exit)
[[keys.command]]
key = "prefix+C"
type = "popup"
command = "bash -lc '$SHELL'"
description = "Quick shell"

# Lazygit (uses lazygit-launch to pick up profile-specific overlays, e.g.
# config-remote-sandbox.yml's autoFetch: false on remote-sandbox/crafting boxes)
[[keys.command]]
key = "prefix+G"
type = "popup"
command = "bash -lc lazygit-launch"
description = "Lazygit"
width = "80%"
height = "80%"

# pj project picker — prefix+shift+p (pj-herdr plugin; moved off prefix+o to make room for goto)
[[keys.command]]
key = "prefix+shift+p"
type = "plugin_action"
command = "pj.open-picker"
description = "Project picker (pj)"

# Open existing branch as a herdr worktree (tv cable channel)
[[keys.command]]
key = "prefix+shift+o"
type = "popup"
command = "bash -lc 'tv herdr-worktree'"
description = "Open branch as worktree"
width = "80%"
height = "80%"

# herdr-plugin-gh-pr (https://github.com/wyattjoh/herdr-plugin-gh-pr)
# Open focused pane's branch PR in the browser — prefix+g (default goto freed;
# goto lives at prefix+o instead)
[[keys.command]]
key = "prefix+g"
type = "plugin_action"
command = "gh-pr.open-pr"
description = "Open PR in browser"

# Manually refresh PR status for the focused pane's branch — prefix+u
[[keys.command]]
key = "prefix+u"
type = "plugin_action"
command = "gh-pr.refresh"
description = "Refresh PR status"


[ui]
show_agent_labels_on_pane_borders = true
agent_panel_scope = "all"

[ui.toast]
delivery = "herdr"

[theme]
name = "terminal"
