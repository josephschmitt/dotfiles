# Applications
# App split windows, application popups, and television popups

# Application split windows
bind-key A split-window -h -l 100 -c "#{pane_current_path}" "claude"
bind-key O split-window -h -l 100 -c "#{pane_current_path}" "opencode"
bind-key / split-window -h -l 100 -c "#{pane_current_path}" "scooter"

# Application windows
bind-key Y new-window -n "yazi" -c "#{pane_current_path}" "yazi"

# Application popups (using standardized tmux-popup script)
bind-key c run-shell "$TMUX_CONFIG_DIR/scripts/tmux-popup -s xsmall -t 'Quick Shell' -E $TMUX_CONFIG_DIR/scripts/quick-shell.sh"
bind-key C run-shell "$TMUX_CONFIG_DIR/scripts/tmux-popup -s xsmall -t 'Mini Shell' -E $TMUX_CONFIG_DIR/scripts/quick-shell.sh --persist"

bind-key E run-shell "$TMUX_CONFIG_DIR/scripts/tmux-popup -w 100 -h 150 -t 'Editor' -E $EDITOR"
bind-key g run-shell "$TMUX_CONFIG_DIR/scripts/lazygit-tab.sh"
bind-key -n M-g run-shell "$TMUX_CONFIG_DIR/scripts/lazygit-tab.sh"
bind-key G run-shell "$TMUX_CONFIG_DIR/scripts/tmux-popup -s medium -t 'Lazygit' -E lazygit || true"
bind-key M run-shell "$TMUX_CONFIG_DIR/scripts/tmux-popup -s medium -w 120 -t 'Scratch' -E nvim -c 'enew | setlocal buftype=nofile bufhidden=wipe noswapfile | file [Scratch]'"
# bind-key C run-shell "$TMUX_CONFIG_DIR/scripts/tmux-popup -s medium -t 'Scooter' -E scooter"

# Workmux popups (prefix + w enters workmux key table)
bind-key w switch-client -T workmux
bind-key -T workmux d run-shell "$TMUX_CONFIG_DIR/scripts/tmux-popup -s large -t 'Workmux' -E 'workmux dashboard'"
bind-key -T workmux a run-shell "$TMUX_CONFIG_DIR/scripts/tmux-popup -s xsmall -t ' Add Worktree' -E 'bubble input -H \"Branch name\" -p \"> \" -- workmux add || true'"
bind-key -T workmux m run-shell "$TMUX_CONFIG_DIR/scripts/tmux-popup -s xsmall -t ' Merge Worktree' -E 'bubble input -H \"Branch to merge\" --allow-empty -- workmux merge || true'"
bind-key -T workmux r run-shell "$TMUX_CONFIG_DIR/scripts/tmux-popup -s xsmall -t ' Remove Worktree' -E 'bubble input -H \"Branch to remove\" -- workmux remove || true'"
bind-key -T workmux R run-shell "$TMUX_CONFIG_DIR/scripts/tmux-popup -s xsmall -t ' Force Remove Worktree' -E 'bubble input -H \"Branch to force remove\" -- workmux remove --force'"

# Television popups
bind-key f run-shell "$TMUX_CONFIG_DIR/scripts/tmux-popup -d \$HOME -s large -E tv files || true"
bind-key P run-shell "$TMUX_CONFIG_DIR/scripts/tmux-popup -d \$HOME -s large -E tv pj || true"
bind-key T run-shell "$TMUX_CONFIG_DIR/scripts/tmux-popup -s large -E 'tv --show-remote' || true"
