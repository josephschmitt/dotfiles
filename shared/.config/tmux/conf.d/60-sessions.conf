# Sessions
# Session management with sesh, new sessions, detach, kill, and SSH

# Session management with sesh (https://github.com/joshmedeski/sesh)
bind-key o run-shell "~/.config/tmux/scripts/tmux-popup -d \$HOME -s small -t 'Sesh' -E tv sesh"
bind-key N run-shell "tmux-new-session"                                    # new session with random name
bind-key -n M-N run-shell "tmux-new-session"                               # Alt+N: new session with name prompt

# Session navigation (no prefix needed) - mirrors Alt+[/] window nav
bind-key -n "M-{" switch-client -p                                         # Alt+Shift+[: previous session
bind-key -n "M-}" switch-client -n                                         # Alt+Shift+]: next session
bind-key d detach-client                                                    # detach without confirmation
bind-key q confirm-before -p "Kill session and close terminal? (y/n)" "run-shell '$TMUX_CONFIG_DIR/scripts/kill-session-and-close.sh'"
bind-key Q confirm-before -p "Kill tmux server? (y/n)" kill-server
